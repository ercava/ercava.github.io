      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap {
      max-width: 500px;
      margin: 0 auto;
      padding: 1.5rem;
      text-align: center;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0;
      opacity: 0.1;
      user-select: none;
    }
    .mascot {
      width: 200px;
      height: auto;
      margin: -2.5rem auto 1rem;
      display: block;
      border-radius: 10px;
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
    }
    .message {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--text);
      margin: 0.5rem 0 0.25rem;
    }
    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0 0 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    .attribution {
      text-align: center;
      padding: 2.5rem 0 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      width: 100%;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
    }
    .social-links a {
      color: var(--primary);
      text-decoration: none;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .social-links a:hover { background: #eff6ff; }
    @media (max-width: 600px) {
      .wrap { padding: 1rem; }
      .error-code { font-size: 5rem; }
      .mascot { width: 150px; margin-top: -1.5rem; }
      .message { font-size: 1.05rem; }
      .hint { font-size: 0.8rem; }
      .attribution { padding: 1.5rem 0 1rem; }
      .social-links { gap: 0.5rem; }
      .social-links a { font-size: 0.75rem; padding: 0.35rem 0.5rem; }
    }

<body>
  <div class="wrap">
    <p class="error-code">404</p>
    <img class="mascot" src="erc.my.id/error.png" alt="Confused mascot" />
    <h1 class="message">There is nothing here, perhaps a typo?</h1>
    <p class="hint">The page you're looking for doesn't exist or has moved.</p>
  </div>

  <div class="attribution">
    <div class="social-links">

  </div>
